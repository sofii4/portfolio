name: CI Pipeline

# O deploy em si é feito pela Vercel (integração nativa com o GitHub).
# Esta pipeline cuida só da parte de qualidade: validação de HTML5 real
# e auditoria Lighthouse (performance / acessibilidade / SEO).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-html:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate HTML5 (W3C / Nu Html Checker)
        uses: Cyb3r-Jak3/html5validator-action@v7
        with:
          root: .

  lighthouse:
    runs-on: ubuntu-latest
    needs: validate-html
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './.github/lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
